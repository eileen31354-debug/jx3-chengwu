<script>
  const ICON_VER = 2;

  const SECT_COLOR = {
    '药宗':   '#2E6038',
    '段氏':   '#A03860',
    '衍天宗': '#5030A0',
    '五毒':   '#4A2898',
    '纯阳':   '#1A5A90',
    '万灵':   '#7A4C08',
    '七秀':   '#A02870',
    '长歌':   '#1A6060',
    '蓬莱':   '#0E4878',
    '万花':   '#6020A0',
    '藏剑':   '#885A00',
    '明教':   '#A01800',
    '唐门':   '#3A2878',
  };
  function sectColor(char) {
    const stem = (char.icon || '').replace(/\.png$/i, '');
    return SECT_COLOR[stem] || 'var(--ink-mid)';
  }
  function sectRing(char, alpha) {
    const c = sectColor(char);
    if (c.startsWith('var(')) return `0 0 0 1.5px rgba(44,62,80,${alpha || 0.12})`;
    const r = parseInt(c.slice(1,3),16), g = parseInt(c.slice(3,5),16), b = parseInt(c.slice(5,7),16);
    return `0 0 0 1.5px rgba(${r},${g},${b},${alpha || 0.38})`;
  }

  // ─── Data ────────────────────────────────────────────────────

  const IRON_LEVELS = [
    { level: 70,  name: '天外', short: '天', color: '#6fa8c8' },
    { level: 80,  name: '乌金', short: '乌', color: '#9b7840' },
    { level: 90,  name: '浮屠', short: '浮', color: '#8b6fb5' },
    { level: 95,  name: '星雷', short: '雷', color: '#4a85c9' },
    { level: 100, name: '蜃海', short: '海', color: '#2a9d8f' },
    { level: 110, name: '星络', short: '络', color: '#d4883a' },
    { level: 120, name: '劫烬', short: '劫', color: '#c0392b' },
  ];

  const IRON_MAP = {};
  IRON_LEVELS.forEach(i => { IRON_MAP[i.level] = i; });

  const ADVENTURES = [
    { id: 'sanchi',   name: '三尺青锋',
      requirements: { 70: 150, 80: 150, 90: 200 }, consumes: { 90: 200 } },
    { id: 'jicang',   name: '济苍生',
      requirements: { 90: 150, 95: 200 }, consumes: {} },
    { id: 'zhengzhu', name: '争铸吴钩',
      requirements: { 95: 150, 100: 200 }, consumes: { 100: 150 } },
    { id: 'qianqiu',  name: '千秋铸',
      requirements: { 100: 150, 110: 200 }, consumes: { 110: 200 } },
    { id: 'kunwu',    name: '昆吾余火',
      requirements: { 110: 150, 120: 200 }, consumes: { 120: 200 } },
  ];

  const ACCOUNTS = [
    { id: 'acc1', name: '账号一', characters: [
      { id: 'yuejie',      name: '药姐',  icon: '药宗.png',   isMain: true  },
      { id: 'shanjie',     name: '扇姐',  icon: '段氏.png',   isMain: false },
      { id: 'dengniang',   name: '灯娘',  icon: '衍天宗.png', isMain: false },
    ]},
    { id: 'acc2', name: '账号二', characters: [
      { id: 'duluo',       name: '毒萝',  icon: '五毒.png', isMain: true  },
      { id: 'daogu',       name: '道姑',  icon: '纯阳.png', isMain: false },
      { id: 'gongniang',   name: '弓娘',  icon: '万灵.png', isMain: false },
    ]},
    { id: 'acc3', name: '账号三', characters: [
      { id: 'xiuluo',      name: '秀萝', icon: '七秀.png', isMain: true  },
      { id: 'qinniang',    name: '琴娘', icon: '长歌.png', isMain: false },
      { id: 'sanniang',    name: '伞娘', icon: '蓬莱.png', isMain: false },
    ]},
    { id: 'acc4', name: '账号四', characters: [
      { id: 'huajie_main', name: '花姐', icon: '万花.png', isMain: true  },
      { id: 'hualuo',      name: '花萝', icon: '万花.png', isMain: false },
      { id: 'huajie_2',    name: '花姐', icon: '万花.png', isMain: false },
    ]},
    { id: 'acc5', name: '账号五', characters: [
      { id: 'erxiaojie',   name: '二小姐', icon: '藏剑.png', isMain: false },
      { id: 'miaojie',     name: '喵姐',   icon: '明教.png', isMain: false },
      { id: 'paoluo',      name: '炮萝',   icon: '唐门.png', isMain: false },
    ]},
  ];

  const ALL_CHARS = ACCOUNTS.flatMap(acc => acc.characters.map(c => ({ ...c, accountId: acc.id })));

  // ─── State ───────────────────────────────────────────────────

  let progress = {}, inventory = {}, collapsed = {}, collapsedInv = {};
  let weaponData = {}, wCoupons = {};
  const STORAGE_KEY = 'jx3_cw_v2';

  function loadAll() {
    let saved = null;
    try { saved = JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch {}
    progress  = saved?.progress  || {};
    inventory = saved?.inventory || {};
    collapsed    = saved?.collapsed    || {};
    collapsedInv = saved?.collapsedInv || {};
    weaponData   = saved?.weaponData   || {};
    // migrate: old format was { cw: N, sow: N }, new is { [charId]: { cw:N, sow:N } }
    wCoupons = saved?.wCoupons || {};
    ALL_CHARS.forEach(c => {
      if (!weaponData[c.id]) weaponData[c.id] = {};
      ['cw','sow'].forEach(t => {
        if (!weaponData[c.id][t]) weaponData[c.id][t] = { owned:[], preparing:[], waiting:[] };
        ['owned','preparing','waiting'].forEach(s => {
          if (!Array.isArray(weaponData[c.id][t][s])) weaponData[c.id][t][s] = [];
        });
      });
      // 迁移 / 初始化分级拓印券
      if (!wCoupons[c.id]) wCoupons[c.id] = {};
      ['cw','sow'].forEach(t => {
        const v = wCoupons[c.id][t];
        if (typeof v === 'number') {
          wCoupons[c.id][t] = { low: v, mid: 0, high: 0 };
        } else if (!v || typeof v !== 'object') {
          wCoupons[c.id][t] = { low: 0, mid: 0, high: 0 };
        } else {
          if (v.low  === undefined) v.low  = 0;
          if (v.mid  === undefined) v.mid  = 0;
          if (v.high === undefined) v.high = 0;
        }
      });
    });
    ALL_CHARS.forEach(c => {
      if (!progress[c.id])  progress[c.id]  = {};
      if (!inventory[c.id]) inventory[c.id] = {};
      ADVENTURES.forEach(adv => {
        if (progress[c.id][adv.id]   === undefined) progress[c.id][adv.id]   = 0;
      });
      IRON_LEVELS.forEach(i => {
        if (inventory[c.id][i.level] === undefined) inventory[c.id][i.level] = 0;
      });
    });
    if (!saved) {
      try {
        const v1 = JSON.parse(localStorage.getItem('jx3_cw_v1'));
        const src = v1?.progress || v1;
        if (src) ALL_CHARS.forEach(c => ADVENTURES.forEach(adv => {
          if (src[c.id]?.[adv.id] !== undefined) progress[c.id][adv.id] = src[c.id][adv.id];
        }));
      } catch {}
    }
  }

  function saveAll() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ progress, inventory, collapsed, collapsedInv, weaponData, wCoupons }));
    scheduleSync();
  }

  let _syncTimer = null;

  function scheduleSync() {
    if (!sheetsUrl) return;
    if (_syncTimer) clearTimeout(_syncTimer);
    _syncTimer = setTimeout(silentPush, 3000);
  }

  function silentPush() {
    _syncTimer = null;
    const json = JSON.stringify({ v: 2, progress, inventory, weaponData, wCoupons });
    const b64  = btoa(unescape(encodeURIComponent(json)));
    const body = new URLSearchParams({ action: 'push', data: b64 });
    setSyncStatus('同步中…');
    const sent = navigator.sendBeacon(sheetsUrl, body);
    if (sent) {
      setTimeout(() => {
        const t = new Date().toTimeString().slice(0,8);
        localStorage.setItem('jx3_last_sync', t);
        setSyncStatus('已同步 · ' + t);
      }, 1000);
    } else {
      setSyncStatus('自动同步排队失败，请手动推送', true);
    }
  }

  function debounce(fn, ms) {
    let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
  }
  const debouncedSave = debounce(saveAll, 400);

  // ─── Progress ────────────────────────────────────────────────

  function getStatus(charId, advId) { return progress[charId]?.[advId] ?? 0; }

  const justStamped = new Set();

  function toggleStatus(charId, advId) {
    const next = (progress[charId][advId] + 1) % 3;
    progress[charId][advId] = next;
    if (next === 2) justStamped.add(`${charId}:${advId}`);
    saveAll(); render();
    requestAnimationFrame(() => justStamped.clear());
  }

  // ─── 考据归档抽屉 ────────────────────────────────────────────

  // ─── 考据归档抽屉 ────────────────────────────────────────────

  let sheetsUrl = 'https://script.google.com/macros/s/AKfycbztZScXTgrPPfWWI7xnJPYdMzHT8pT75em97xdZDO0BqD09spadRFT1t9u8ku5wkuQ/exec';

  function openDrawer() {
    document.getElementById('dataDrawer').classList.add('open');
    document.getElementById('drawerOverlay').classList.add('open');
    document.querySelector('main').classList.add('drawer-dim');
    const inp = document.getElementById('sheetsUrlInput');
    if (inp) inp.value = sheetsUrl;
  }
  function closeDrawer() {
    document.getElementById('dataDrawer').classList.remove('open');
    document.getElementById('drawerOverlay').classList.remove('open');
    document.querySelector('main').classList.remove('drawer-dim');
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

  function setSyncStatus(msg, isError) {
    const el = document.getElementById('syncStatus');
    if (!el) return;
    let brief, detail = '';
    if (isError) {
      brief = '云信受阻'; detail = msg;
    } else if (/同步中|推送中|拉取中/.test(msg)) {
      brief = '驿寄云间';
    } else if (/已同步|已推送|已拉取/.test(msg)) {
      const sep = msg.indexOf(' · ');
      brief = '云笺已系' + (sep !== -1 ? '  ' + msg.slice(sep + 1) : '');
    } else if (/绑定|云端/.test(msg)) {
      brief = '云笺已系';
    } else {
      brief = msg;
    }
    document.getElementById('syncBrief').textContent = brief;
    const detailEl = document.getElementById('syncDetail');
    detailEl.textContent = detail;
    detailEl.classList.toggle('show', !!detail);
    el.classList.toggle('err', !!isError);
    el.classList.add('visible');
  }

  function saveSheetUrl() {
    const v = (document.getElementById('sheetsUrlInput')?.value || '').trim();
    sheetsUrl = v;
    localStorage.setItem('jx3_sheets_url', v);
    setSyncStatus(v ? '云端地址已绑定' : '已清除云端地址', !v);
  }

  function testSheetConn() {
    setSyncStatus('已开启测试弹窗…');
    window.open(sheetsUrl, '_blank', 'width=300,height=140,top=200,left=300');
  }

  function pushToSheets() {
    const json = JSON.stringify({ v: 2, progress, inventory, weaponData, wCoupons });
    const b64  = btoa(unescape(encodeURIComponent(json)));
    const html = `<!DOCTYPE html><html><body>
      <form id="f" method="POST" action="${sheetsUrl}">
        <input type="hidden" name="action" value="push">
        <input type="hidden" name="data" value="${b64}">
      </form>
      <script>document.getElementById('f').submit();<\/script>
    </body></html>`;
    const blob = new Blob([html], { type: 'text/html' });
    const blobUrl = URL.createObjectURL(blob);
    window.open(blobUrl, '_blank', 'width=300,height=160,top=200,left=300');
    setTimeout(() => URL.revokeObjectURL(blobUrl), 8000);
    setSyncStatus('推送中…');
    setTimeout(() => setSyncStatus('已推送 · ' + new Date().toTimeString().slice(0,8)), 2500);
  }

  let _pullHandler = null;

  function applyCloudData(data) {
    if (data.progress)   progress   = data.progress;
    if (data.inventory)  inventory  = data.inventory;
    if (data.weaponData) weaponData = data.weaponData;
    wCoupons = data.wCoupons || {};
    ALL_CHARS.forEach(c => {
      if (!progress[c.id])   progress[c.id]   = {};
      if (!inventory[c.id])  inventory[c.id]  = {};
      if (!weaponData[c.id]) weaponData[c.id] = {};
      if (!wCoupons[c.id])   wCoupons[c.id]   = {};
      ADVENTURES.forEach(adv => { if (progress[c.id][adv.id]  === undefined) progress[c.id][adv.id]  = 0; });
      IRON_LEVELS.forEach(i  => { if (inventory[c.id][i.level] === undefined) inventory[c.id][i.level] = 0; });
      ['cw','sow'].forEach(t => {
        if (!weaponData[c.id][t]) weaponData[c.id][t] = { owned:[], preparing:[], waiting:[] };
        ['owned','preparing','waiting'].forEach(s => {
          if (!Array.isArray(weaponData[c.id][t][s])) weaponData[c.id][t][s] = [];
        });
        const v = wCoupons[c.id][t];
        if (typeof v === 'number')            wCoupons[c.id][t] = { low: v, mid: 0, high: 0 };
        else if (!v || typeof v !== 'object') wCoupons[c.id][t] = { low: 0, mid: 0, high: 0 };
        else { if (v.low===undefined) v.low=0; if (v.mid===undefined) v.mid=0; if (v.high===undefined) v.high=0; }
      });
    });
    saveAll(); render();
    if (activeTab === 'inventory') renderInventory();
    if (activeTab === 'cw' || activeTab === 'sow') renderWeaponPane(activeTab);
  }

  function pullFromSheets() {
    if (!sheetsUrl) { setSyncStatus('请先绑定 Apps Script 网址', true); return; }
    setSyncStatus('拉取中…');
    const cbName = '__jx3_' + Date.now();
    const script = document.createElement('script');
    const cleanup = () => { if (script.parentNode) document.head.removeChild(script); delete window[cbName]; };
    const timer = setTimeout(() => { cleanup(); setSyncStatus('拉取超时，请重试', true); }, 12000);
    window[cbName] = (data) => {
      clearTimeout(timer); cleanup();
      if (data.error) { setSyncStatus('云端暂无数据', true); return; }
      applyCloudData(data);
      setSyncStatus('已拉取 · ' + new Date().toTimeString().slice(0,8));
    };
    script.onerror = () => { clearTimeout(timer); cleanup(); setSyncStatus('脚本加载失败，请检查网址', true); };
    script.src = sheetsUrl + '?action=pull&cb=' + cbName;
    document.head.appendChild(script);
  }

  function showModal(onConfirm) {
    const overlay = document.getElementById('modalOverlay');
    overlay.classList.add('open');
    const cancel  = document.getElementById('modalCancel');
    const confirm = document.getElementById('modalConfirm');
    const close = () => overlay.classList.remove('open');
    const onC = () => { close(); onConfirm(); };
    cancel.onclick  = close;
    confirm.onclick = onC;
    overlay.onclick = e => { if (e.target === overlay) close(); };
  }

  function resetAll() {
    showModal(() => {
      ALL_CHARS.forEach(c => ADVENTURES.forEach(adv => { progress[c.id][adv.id] = 0; }));
      saveAll(); render();
    });
  }

  function toggleCollapse(accId) {
    collapsed[accId] = !collapsed[accId];
    saveAll();
    renderMatrix();
  }

  function toggleCollapseInv(accId) {
    collapsedInv[accId] = !collapsedInv[accId];
    saveAll();
    renderInventory();
  }

  // ─── Inventory ───────────────────────────────────────────────

  function getInv(charId, level) { return inventory[charId]?.[level] ?? 0; }

  function setInv(charId, level, qty) {
    inventory[charId][level] = Math.max(0, qty);
    debouncedSave();
  }

  function addInv(charId, level, amount) {
    setInv(charId, level, getInv(charId, level) + amount);
    renderInventory();
  }

  // ─── Calculations ─────────────────────────────────────────────

  function calcCharNeeds(charId) {
    const needs = {};
    ADVENTURES.forEach(adv => {
      if (getStatus(charId, adv.id) !== 1) return;
      Object.entries(adv.requirements).forEach(([lvl, qty]) => {
        needs[lvl] = (needs[lvl] || 0) + qty;
      });
    });
    return needs;
  }

  function checkIronSufficient(charId, advId) {
    const adv = ADVENTURES.find(a => a.id === advId);
    return Object.entries(adv.requirements).every(
      ([lvl, qty]) => getInv(charId, parseInt(lvl)) >= qty
    );
  }

  function isAdventureReady(charId, advId) {
    if (getStatus(charId, advId) !== 1) return false;
    return checkIronSufficient(charId, advId);
  }

  // ─── Render: Stats ────────────────────────────────────────────

  function renderStats() {
    const total = ALL_CHARS.length * ADVENTURES.length;
    let active = 0, done = 0;
    ALL_CHARS.forEach(c => ADVENTURES.forEach(adv => {
      const s = getStatus(c.id, adv.id);
      if (s === 1) active++;
      if (s === 2) done++;
    }));
    const pct = Math.round(done / total * 100);
    const r = 31, circ = +(2 * Math.PI * r).toFixed(1);
    const filled = +(pct / 100 * circ).toFixed(1);

    document.getElementById('statsRow').innerHTML = `
      <div class="sb-panel">
        <div class="sb-num">${total}</div>
        <div class="sb-lbl">奇遇总数</div>
        <div class="sb-glyph">总</div>
      </div>
      <div class="sb-panel">
        <div class="sb-num gold">${active}</div>
        <div class="sb-lbl">进行中</div>
        <div class="sb-glyph">进</div>
      </div>
      <div class="sb-panel">
        <div class="sb-num bamboo">${done}</div>
        <div class="sb-lbl">已完成</div>
        <div class="sb-glyph">完</div>
      </div>
      <div class="sb-panel">
        <div class="sb-num muted">${total - active - done}</div>
        <div class="sb-lbl">未开启</div>
        <div class="sb-glyph">余</div>
      </div>
      <div class="arc-stat">
        <div class="arc-wrap">
          <svg class="arc-svg" viewBox="0 0 72 72">
            <circle class="arc-track" cx="36" cy="36" r="${r}"/>
            <circle class="arc-fill"  cx="36" cy="36" r="${r}"
              stroke-dasharray="${filled} ${circ}"
              stroke-dashoffset="${-(circ / 4).toFixed(1)}"/>
          </svg>
          <div class="arc-center">
            <div class="arc-pct">${pct}%</div>
            <div class="arc-sub">完成率</div>
          </div>
        </div>
      </div>`;
  }

  // ─── Render: Adventure header ─────────────────────────────────

  function renderAdvHeader() {
    const cols = ADVENTURES.map(adv => {
      const reqHtml = Object.entries(adv.requirements).map(([lvl, qty]) => {
        const iron = IRON_MAP[parseInt(lvl)];
        const isConsumed = adv.consumes[lvl] !== undefined;
        const consumeQty = adv.consumes[lvl];
        const isPartial  = isConsumed && consumeQty !== qty;
        const suffixHtml = isPartial
          ? `<span class="consume-hint" title="触发后实际扣除 ${consumeQty} 块">(${consumeQty})</span>`
          : isConsumed
            ? `<span class="req-minus" title="触发奇遇时将扣除此数量">−</span>`
            : `<span class="req-minus" aria-hidden="true"></span>`;
        return `<span class="req-tag${isConsumed ? ' consumed' : ''}" style="border-left-color:${iron.color}" data-iron="${lvl}">
          <span class="req-dot" style="background:${iron.color}"></span>
          <span class="req-label">${lvl}级·${iron.name}</span>
          <span class="req-spacer"></span>
          <span class="req-qty">${qty}</span>${suffixHtml}
        </span>`;
      }).join('');
      return `<div class="adv-hdr-col">
        <div class="adv-hdr-name">${adv.name}</div>
        <div class="adv-hdr-req">${reqHtml}</div>
      </div>`;
    }).join('');
    document.getElementById('advHdr').innerHTML =
      `<div class="adv-hdr-char"></div>${cols}`;
  }

  // ─── Render: Cell content ─────────────────────────────────────

  function buildCell(char, adv) {
    const s   = getStatus(char.id, adv.id);
    const key = `${char.id}:${adv.id}`;

    if (s === 0) {
      const sufficient = checkIronSufficient(char.id, adv.id);
      const reqs = Object.entries(adv.requirements);
      const hasAnyIron = reqs.some(([lvl]) => getInv(char.id, parseInt(lvl)) > 0);
      if (!hasAnyIron && !sufficient) {
        return `<div class="cell-void-empty"></div>`;
      }
      const bars = reqs.map(([lvl, needed]) => {
        const iron  = IRON_MAP[parseInt(lvl)];
        const owned = getInv(char.id, parseInt(lvl));
        if (owned === 0) return '';
        const pct   = Math.min(100, owned / needed * 100).toFixed(0);
        const ok    = owned >= needed;
        return `<div class="iron-bar-mini">
          <span class="iron-dot-mini" style="background:${iron.color}"></span>
          <div class="iron-track">
            <div class="iron-fill" style="width:${pct}%;background:${iron.color}"></div>
          </div>
          <span class="iron-nums"><span class="iron-own${ok ? ' ok' : ''}">${owned}</span><span class="iron-sep">/</span><span class="iron-ttl">${needed}</span></span>
        </div>`;
      }).filter(Boolean).join('');
      const readyHtml = sufficient ? `<div class="ready-pill">可触发</div>` : '';
      return `<div class="cell-void${sufficient ? ' iron-ready' : ''}">
        ${bars}
        ${readyHtml}
      </div>`;
    }

    if (s === 1) {
      const ready = isAdventureReady(char.id, adv.id);
      const bars = Object.entries(adv.requirements).map(([lvl, needed]) => {
        const iron  = IRON_MAP[parseInt(lvl)];
        const owned = getInv(char.id, parseInt(lvl));
        const pct   = Math.min(100, owned / needed * 100).toFixed(0);
        const ok    = owned >= needed;
        return `<div class="iron-bar-mini">
          <span class="iron-dot-mini" style="background:${iron.color}"></span>
          <div class="iron-track">
            <div class="iron-fill" style="width:${pct}%;background:${iron.color}"></div>
          </div>
          <span class="iron-nums"><span class="iron-own${ok ? ' ok' : ' short'}">${owned}</span><span class="iron-sep">/</span><span class="iron-ttl">${needed}</span></span>
        </div>`;
      }).join('');
      const readyHtml = ready ? `<div class="ready-pill">可触发</div>` : '';
      return `<div class="cell-active">
        <span class="active-label">进行中</span>
        ${bars}
        ${readyHtml}
      </div>`;
    }

    // s === 2
    const animCls = justStamped.has(key) ? ' stamping' : '';
    return `<div class="cell-done">
      <div class="seal-ring${animCls}">
        <span class="seal-char">成</span>
      </div>
    </div>`;
  }

  // ─── Render: Matrix ───────────────────────────────────────────

  function renderMatrix() {
    renderAdvHeader();
    document.getElementById('accCards').innerHTML = ACCOUNTS.map(acc => {
      const tot    = acc.characters.length * ADVENTURES.length;
      const done   = acc.characters.reduce((s, c) =>
        s + ADVENTURES.filter(adv => getStatus(c.id, adv.id) === 2).length, 0);
      const active = acc.characters.reduce((s, c) =>
        s + ADVENTURES.filter(adv => getStatus(c.id, adv.id) === 1).length, 0);
      const isCollapsed = !!collapsed[acc.id];

      const progHtml = `<span class="acc-hdr-prog">
        <span class="prog-done">${done}</span>
        <span> / ${tot} 已完成</span>
        ${active > 0 ? `<span class="prog-active"> · ${active} 进行中</span>` : ''}
      </span>`;

      const rows = acc.characters.map(char => {
        const cells = ADVENTURES.map(adv =>
          `<div class="adv-col" onclick="toggleStatus('${char.id}','${adv.id}')">
            ${buildCell(char, adv)}
          </div>`).join('');
        return `<div class="char-row">
          <div class="char-col" style="background:linear-gradient(to right,${sectColor(char)}0D 0%,transparent 80%)">
            <div class="char-icon-wrap" style="box-shadow:${sectRing(char)},0 2px 8px rgba(44,62,80,0.08)">
              <img class="char-icon" src="${char.icon}?v=${ICON_VER}" alt="${char.name}"
                   onerror="this.style.visibility='hidden'">
            </div>
            <div>
              <span class="char-name" style="color:${sectColor(char)}">${char.name}</span>
              ${char.isMain ? '<span class="badge-main">大号</span>' : ''}
            </div>
          </div>
          ${cells}
        </div>`;
      }).join('');

      return `<div class="acc-card">
        <div class="inv-card-hdr acc-hdr-toggle${isCollapsed ? ' is-collapsed-hdr' : ''}" onclick="toggleCollapse('${acc.id}')">
          <span class="acc-toggle-icon${isCollapsed ? ' is-collapsed' : ''}"></span>
          <span>${acc.name}</span>
          ${progHtml}
        </div>
        <div class="acc-body${isCollapsed ? ' is-collapsed' : ''}">
          ${rows}
        </div>
      </div>`;
    }).join('');
  }

  // ─── Render: Materials ────────────────────────────────────────

  // ─── Render: Inventory ────────────────────────────────────────

  let editCell = null;

  function startEdit(charId, level) {
    if (editCell) commitEdit();
    editCell = { charId, level };
    const el = document.getElementById(`qty-${charId}-${level}`);
    if (!el) return;
    el.innerHTML = `<input class="inv-qty-input" type="number" min="0"
      value="${getInv(charId, level)}"
      onblur="commitEdit()" onkeydown="handleEditKey(event)">`;
    const inp = el.querySelector('input');
    inp.focus(); inp.select();
  }

  function commitEdit() {
    if (!editCell) return;
    const { charId, level } = editCell;
    const el  = document.getElementById(`qty-${charId}-${level}`);
    const inp = el?.querySelector('input');
    const v   = parseInt(inp?.value);
    setInv(charId, level, isNaN(v) ? 0 : v);
    editCell = null;
    renderInventory();
  }

  function handleEditKey(e) {
    if (e.key === 'Enter')  { e.target.blur(); return; }
    if (e.key === 'Escape') { editCell = null; renderInventory(); return; }
    if (e.key === 'Tab') {
      e.preventDefault();
      const { charId, level } = editCell;
      const v = parseInt(e.target.value);
      setInv(charId, level, isNaN(v) ? 0 : v);
      editCell = null;
      const lvls  = IRON_LEVELS.map(i => i.level);
      const chars = ALL_CHARS.map(c => c.id);
      let li = lvls.indexOf(level), ci = chars.indexOf(charId);
      if (++li >= lvls.length) { li = 0; ci = (ci + 1) % chars.length; }
      renderInventory();
      setTimeout(() => startEdit(chars[ci], lvls[li]), 0);
    }
  }

  function resetInventory() {
    if (!confirm('确定要清空所有角色的库存数据？')) return;
    ALL_CHARS.forEach(c => IRON_LEVELS.forEach(i => { inventory[c.id][i.level] = 0; }));
    saveAll(); renderInventory();
  }

  function renderInventory() {
    // Header
    const hdrCols = IRON_LEVELS.map(iron => `
      <div class="inv-hdr-iron" style="background:${iron.color}0D">
        <span class="dot-xs" style="background:${iron.color}"></span>
        <div class="inv-hdr-iron-name" style="color:${iron.color}">${iron.name}</div>
        <div class="inv-hdr-iron-lvl">${iron.level} 级</div>
      </div>`).join('');
    document.getElementById('invHdr').innerHTML =
      `<div class="inv-hdr-char"></div>${hdrCols}`;

    // Cards
    document.getElementById('invCards').innerHTML = ACCOUNTS.map(acc => {
      const rows = acc.characters.map(char => {
        const needs = calcCharNeeds(char.id);
        const cells = IRON_LEVELS.map(iron => {
          const owned  = getInv(char.id, iron.level);
          const needed = needs[iron.level] || 0;
          const isEd   = editCell?.charId === char.id && editCell?.level === iron.level;
          let cls = '', gapHtml = '';
          if (needed > 0) {
            cls = owned >= needed ? 'sufficient' : 'insufficient';
            gapHtml = owned >= needed
              ? `<span class="inv-gap ok"></span>`
              : `<span class="inv-gap short">−${needed - owned}</span>`;
          } else {
            gapHtml = `<span class="inv-gap none"></span>`;
          }
          const qtyHtml = isEd
            ? `<input class="inv-qty-input" type="number" min="0" value="${owned}"
                 onblur="commitEdit()" onkeydown="handleEditKey(event)">`
            : `<span>${owned}</span>`;
          return `<div class="inv-iron-col">
            <div class="inv-cell-inner ${cls}">
              <div class="inv-qty" id="qty-${char.id}-${iron.level}"
                   onclick="startEdit('${char.id}',${iron.level})">${qtyHtml}</div>
              ${gapHtml}
              <div class="inv-btns">
                <button class="inv-btn" onclick="addInv('${char.id}',${iron.level},1)">+</button>
              </div>
            </div>
          </div>`;
        }).join('');
        return `<div class="inv-char-row">
          <div class="inv-char-col" style="background:linear-gradient(to right,${sectColor(char)}0D 0%,transparent 80%)">
            <div class="char-icon-wrap" style="box-shadow:${sectRing(char)},0 2px 8px rgba(44,62,80,0.08)">
              <img class="char-icon" src="${char.icon}?v=${ICON_VER}" alt="${char.name}"
                   onerror="this.style.visibility='hidden'">
            </div>
            <div>
              <span class="char-name" style="color:${sectColor(char)}">${char.name}</span>
              ${char.isMain ? '<span class="badge-main">大号</span>' : ''}
            </div>
          </div>
          ${cells}
        </div>`;
      }).join('');
      const isCollapsedInv = !!collapsedInv[acc.id];
      const invTotal = acc.characters.reduce((s, c) =>
        s + IRON_LEVELS.reduce((t, i) => t + getInv(c.id, i.level), 0), 0);
      const invProgHtml = `<span class="acc-hdr-prog">
        ${invTotal > 0 ? `<span class="prog-done">${invTotal}</span><span> 件库存</span>` : '<span>暂无库存</span>'}
      </span>`;
      return `<div class="inv-card">
        <div class="inv-card-hdr acc-hdr-toggle${isCollapsedInv ? ' is-collapsed-hdr' : ''}" onclick="toggleCollapseInv('${acc.id}')">
          <span class="acc-toggle-icon${isCollapsedInv ? ' is-collapsed' : ''}"></span>
          <span>${acc.name}</span>
          ${invProgHtml}
        </div>
        <div class="acc-body${isCollapsedInv ? ' is-collapsed' : ''}">
          ${rows}
        </div>
      </div>`;
    }).join('');

    if (editCell) {
      const inp = document.getElementById(`qty-${editCell.charId}-${editCell.level}`)?.querySelector('input');
      if (inp) { inp.focus(); inp.select(); }
    }
  }

  // ─── Export / Import ──────────────────────────────────────────

  function exportData() {
    document.getElementById('dataTa').value =
      JSON.stringify({ v: 2, progress, inventory }, null, 2);
  }

  function importData() {
    const raw = document.getElementById('dataTa').value.trim();
    if (!raw) return alert('请先粘贴备份 JSON。');
    let p; try { p = JSON.parse(raw); } catch { return alert('JSON 格式错误。'); }
    if (p.progress)  progress  = p.progress;
    if (p.inventory) inventory = p.inventory;
    ALL_CHARS.forEach(c => {
      if (!progress[c.id])  progress[c.id]  = {};
      if (!inventory[c.id]) inventory[c.id] = {};
      ADVENTURES.forEach(adv => { if (progress[c.id][adv.id]   === undefined) progress[c.id][adv.id]   = 0; });
      IRON_LEVELS.forEach(i  => { if (inventory[c.id][i.level] === undefined) inventory[c.id][i.level] = 0; });
    });
    saveAll(); render(); alert('导入成功！');
  }

  // ─── Weapon Tracking ─────────────────────────────────────────

  const STAGE_CN = ['','一','二','三','四','五','六','七','八'];

  const COUPON_TIERS = {
    cw:  [
      { id:'low',  label:'低',  title:'70–110级券' },
      { id:'mid',  label:'120', title:'120级券' },
      { id:'high', label:'130', title:'130级券' },
    ],
    sow: [
      { id:'low',  label:'低',  title:'80–100级券' },
      { id:'mid',  label:'110', title:'110级券' },
      { id:'high', label:'120', title:'120级券' },
    ],
  };
  let wSub = { cw: 'preparing', sow: 'preparing' };
  let wCollapsed = { cw: {}, sow: {} };
  let wAdding = null; // { charId, type, sub }
  let wEditing = null; // { charId, type, sub, idx }
  let wCouponEdit = null; // { charId, type } | null

  function getWeapons(charId, type, sub) {
    return weaponData[charId]?.[type]?.[sub] || [];
  }

  function removeWeapon(charId, type, sub, idx) {
    weaponData[charId][type][sub].splice(idx, 1);
    saveAll(); renderWeaponPane(type);
  }

  function startAddWeapon(charId, type, sub) {
    wAdding = { charId, type, sub };
    renderWeaponPane(type);
    setTimeout(() => {
      const inp = document.getElementById('w-name-inp');
      if (inp) inp.focus();
    }, 0);
  }

  function commitWeapon(type) {
    if (!wAdding) return;
    const { charId, sub } = wAdding;
    const nameEl = document.getElementById('w-name-inp');
    const name = nameEl?.value.trim();
    if (name) {
      const entry = type === 'sow' ? { name } : name;
      weaponData[charId][type][sub].push(entry);
      saveAll();
    }
    wAdding = null;
    renderWeaponPane(type);
  }

  function cancelWeapon(type) { wAdding = null; renderWeaponPane(type); }

  function startEditWeapon(charId, type, sub, idx) {
    wAdding = null;
    wEditing = { charId, type, sub, idx };
    renderWeaponPane(type);
    setTimeout(() => {
      const inp = document.getElementById('w-edit-inp');
      if (inp) { inp.focus(); inp.select(); }
    }, 0);
  }

  function commitEditWeapon(type) {
    if (!wEditing) return;
    const { charId, sub, idx } = wEditing;
    const inp = document.getElementById('w-edit-inp');
    const name = inp?.value.trim();
    const list = weaponData[charId][type][sub];
    if (name) {
      list[idx] = type === 'sow' ? { ...list[idx], name } : name;
      saveAll();
    }
    wEditing = null;
    renderWeaponPane(type);
  }

  function handleEditWeaponKey(e, type) {
    if (e.key === 'Enter')  commitEditWeapon(type);
    if (e.key === 'Escape') { wEditing = null; renderWeaponPane(type); }
  }

  function handleWeaponKey(e, type) {
    if (e.key === 'Enter')  commitWeapon(type);
    if (e.key === 'Escape') cancelWeapon(type);
  }

  function getCharCoupon(charId, type, tier) {
    return wCoupons[charId]?.[type]?.[tier] ?? 0;
  }
  function setCharCoupon(charId, type, tier, val) {
    if (!wCoupons[charId]) wCoupons[charId] = {};
    if (!wCoupons[charId][type]) wCoupons[charId][type] = { low:0, mid:0, high:0 };
    wCoupons[charId][type][tier] = Math.max(0, parseInt(val) || 0);
    saveAll();
  }
  function startTierEdit(charId, type, tier) {
    wCouponEdit = { charId, type, tier };
    renderWeaponPane(type);
    setTimeout(() => {
      const inp = document.getElementById(`coup-inp-${charId}-${tier}`);
      if (inp) { inp.focus(); inp.select(); }
    }, 0);
  }
  function commitTierEdit(charId, type, tier) {
    const inp = document.getElementById(`coup-inp-${charId}-${tier}`);
    if (inp) setCharCoupon(charId, type, tier, inp.value);
    wCouponEdit = null;
    renderWeaponPane(type);
  }
  function handleTierKey(e, charId, type, tier) {
    if (e.key === 'Enter' || e.key === 'Escape') {
      commitTierEdit(charId, type, tier);
      return;
    }
    if (e.key === 'Tab') {
      e.preventDefault();
      const inp = document.getElementById(`coup-inp-${charId}-${tier}`);
      if (inp) setCharCoupon(charId, type, tier, inp.value);
      wCouponEdit = null;
      const tiers = COUPON_TIERS[type].map(t => t.id);
      const chars = ALL_CHARS.map(c => c.id);
      let ti = tiers.indexOf(tier), ci = chars.indexOf(charId);
      if (++ti >= tiers.length) { ti = 0; ci = (ci + 1) % chars.length; }
      renderWeaponPane(type);
      setTimeout(() => startTierEdit(chars[ci], type, tiers[ti]), 0);
    }
  }

  function renderWeaponPane(type) {
    const sub  = wSub[type];
    const pane = document.getElementById(`pane-${type}`);
    if (!pane) return;

    const subDefs = [
      { id:'preparing', label:'筹备中' },
      { id:'waiting',   label:'候时而动' },
      { id:'owned',     label:'已拓印' },
    ];

    const subNavHtml = subDefs.map((s, i) => `
      ${i > 0 ? '<span class="wsubtab-sep">·</span>' : ''}
      <button class="wsubtab${sub===s.id?' active':''}"
        onclick="wSub['${type}']='${s.id}'; renderWeaponPane('${type}')">${s.label}</button>
    `).join('');

    const contentHtml = ACCOUNTS.map((acc, accIdx) => {
      const rows = acc.characters.map(char => {
        const list   = getWeapons(char.id, type, sub);
        const isAdd  = wAdding?.charId === char.id && wAdding?.type === type && wAdding?.sub === sub;

        const tagsHtml = list.map((w, idx) => {
          const name    = type === 'sow' ? w.name : w;
          const isEdit  = wEditing?.charId === char.id && wEditing?.type === type && wEditing?.sub === sub && wEditing?.idx === idx;
          const nameHtml = isEdit
            ? `「<input id="w-edit-inp" class="weapon-edit-input"
                  value="${name.replace(/"/g, '&quot;')}"
                  onkeydown="handleEditWeaponKey(event,'${type}')"
                  onblur="setTimeout(()=>commitEditWeapon('${type}'),160)">」`
            : `<span class="weapon-name" onclick="startEditWeapon('${char.id}','${type}','${sub}',${idx})">「${name}」</span>`;
          return `<span class="weapon-entry ${sub}">
            ${nameHtml}
            <button class="weapon-rm" onclick="removeWeapon('${char.id}','${type}','${sub}',${idx})">×</button>
          </span>`;
        }).join('');

        const inputHtml = isAdd ? `<span class="weapon-inline-form">
          <input id="w-name-inp" class="weapon-name-input" placeholder="武器名"
            onkeydown="handleWeaponKey(event,'${type}')"
            onblur="setTimeout(()=>commitWeapon('${type}'),160)">
        </span>` : '';

        const emptyHtml = !tagsHtml && !isAdd
          ? `<span class="weapon-none">虚位以待</span>` : '';

        const couponHtml = `<span class="char-coupon-tiers ${type}">${
          COUPON_TIERS[type].map((t, i) => {
            const isEdit = wCouponEdit?.charId === char.id && wCouponEdit?.type === type && wCouponEdit?.tier === t.id;
            const cnt = getCharCoupon(char.id, type, t.id);
            const numHtml = isEdit
              ? `<input id="coup-inp-${char.id}-${t.id}" class="coupon-tier-input ${type}" type="number" min="0" value="${cnt}"
                   onblur="commitTierEdit('${char.id}','${type}','${t.id}')"
                   onkeydown="handleTierKey(event,'${char.id}','${type}','${t.id}')">`
              : `<span class="coupon-tier-num ${type}${cnt===0?' empty':''}">${cnt===0?'—':cnt}</span>`;
            const sep = i > 0 ? `<span class="coupon-tier-sep"></span>` : '';
            return `${sep}<span class="coupon-tier-cell" title="${t.title}" onclick="startTierEdit('${char.id}','${type}','${t.id}')">
              ${numHtml}<span class="coupon-tier-lbl ${type}">${t.label}</span>
            </span>`;
          }).join('')
        }</span>`;

        return `<div class="weapon-char-row" style="background:linear-gradient(to right,${sectColor(char)}0D 0%,transparent 48%)">
          <img class="weapon-char-icon" src="${char.icon}?v=${ICON_VER}" alt="${char.name}"
               style="box-shadow:${sectRing(char)}" onerror="this.style.visibility='hidden'">
          <span class="weapon-char-lbl" style="color:${sectColor(char)}">${char.name}</span>
          ${couponHtml}
          <div class="weapon-entries">${tagsHtml}${emptyHtml}${inputHtml}</div>
          ${!isAdd ? `<button class="weapon-add-trigger"
            onclick="startAddWeapon('${char.id}','${type}','${sub}')">+</button>` : ''}
        </div>`;
      }).join('');

      const isCollapsed = !!wCollapsed[type][accIdx];
      return `<div class="weapon-acc-group${isCollapsed ? ' collapsed' : ''}">
        <div class="weapon-acc-lbl" onclick="wCollapsed['${type}'][${accIdx}]=!wCollapsed['${type}'][${accIdx}]; renderWeaponPane('${type}')">
          <div class="weapon-acc-bar"></div>
          <span class="weapon-acc-name">${acc.name}</span>
          <span class="weapon-acc-chevron"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><polyline points="2,3.5 5,6.5 8,3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        </div>
        <div class="weapon-acc-rows">${rows}</div>
      </div>`;
    }).join('');

    pane.innerHTML = `
      <div class="weapon-subnav">${subNavHtml}</div>
      <div>${contentHtml}</div>`;
  }

  // ─── Tab ─────────────────────────────────────────────────────

  let activeTab = 'progress';

  function switchTab(tab) {
    if (activeTab === tab) return;
    activeTab = tab;
    document.querySelectorAll('.pane').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById(`pane-${tab}`).classList.add('active');
    document.getElementById(`tabBtn-${tab}`).classList.add('active');
    if (tab === 'inventory') { renderInventory(); }
    if (tab === 'cw' || tab === 'sow') { wCouponEdit = null; wAdding = null; wEditing = null; renderWeaponPane(tab); }
  }

  // ─── Main ────────────────────────────────────────────────────

  function render() {
    renderStats(); renderMatrix();
    if (activeTab === 'inventory') { renderInventory(); }
  }

  loadAll(); render();
  if (sheetsUrl) {
    const lastSync = localStorage.getItem('jx3_last_sync');
    setSyncStatus(lastSync ? '已同步 · ' + lastSync : '云笺已系');
  }
</script>

<div id="modalOverlay" class="modal-overlay">
  <div class="custom-modal">
    <h3 class="modal-title">慎思</h3>
    <p class="modal-body">确定要清空所有角色的奇遇进度吗？<br>此举如焚稿，不可复得。</p>
    <div class="modal-footer">
      <button class="modal-btn modal-btn-cancel" id="modalCancel">罢手</button>
      <button class="modal-btn modal-btn-confirm" id="modalConfirm">焚稿</button>
    </div>
  </div>
</div>
</body>
</html>
