<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>橙武奇遇追踪器</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32' fill='none'><polygon points='16,4 14.8,19 16,21.5 17.2,19' fill='%23B8881E'/><line x1='11' y1='21' x2='21' y2='21' stroke='%238B6018' stroke-width='1.8' stroke-linecap='round'/><line x1='16' y1='21' x2='16' y2='27.5' stroke='%238B6018' stroke-width='2.2' stroke-linecap='round'/><circle cx='16' cy='27.5' r='1.5' fill='%238B6018'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    /* ─── Tokens ─────────────────────────────────────────────── */
    :root {
      --paper:       #F7F3EE;
      --card:        #FFFFFF;
      --ink:         #1A2535;
      --ink-mid:     #344A5E;
      --ink-faint:   rgba(26,37,53,0.12);
      --gold:        #B8881E;
      --gold-dim:    rgba(184,136,30,0.10);
      --bamboo:      #2E6644;
      --bamboo-dim:  rgba(46,102,68,0.10);
      --seal:        #7A2020;
      --seal-dim:    rgba(122,32,32,0.07);
      --border:      #ddd6ca;
      --border-mid:  #c8bfb0;
      --muted:       #7a7060;
      --paper-shadow: 0 1px 0 rgba(0,0,0,0.06);
      --card-shadow:  0 0 0 1px rgba(0,0,0,0.08);
      --sans: 'Noto Serif SC', 'STSong', 'SimSun', serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Serif SC', 'STSong', 'SimSun', serif;
      background: var(--paper);
      background-image: radial-gradient(circle, rgba(90,70,40,0.03) 1px, transparent 1px);
      background-size: 24px 24px;
      color: var(--ink);
      min-height: 100vh;
    }

    /* ─── Header ──────────────────────────────────────────────── */
    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 12px 28px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 300;
      box-shadow: 0 1px 12px rgba(0,0,0,0.07);
    }

    .hdr-left { display: flex; align-items: center; gap: 14px; }

    .hdr-accent-bar {
      width: 3px; height: 28px;
      background: linear-gradient(to bottom, var(--gold) 60%, transparent);
      border-radius: 2px;
    }

    .hdr-title {
      font-family: 'Noto Serif SC', 'STSong', 'SimSun', serif;
      font-size: 20px; font-weight: 400;
      letter-spacing: 6px; color: var(--ink);
    }

    .hdr-sub {
      font-size: 9px; color: #aaa;
      letter-spacing: 3px; margin-top: 3px;
    }

    .hdr-right { display: flex; gap: 10px; }

    .btn {
      padding: 5px 14px; border-radius: 4px; border: 1px solid;
      font-size: 11px; letter-spacing: 1px; cursor: pointer;
      font-family: inherit; transition: all 0.2s;
    }
    .btn-ghost  { border-color: var(--border-mid); color: var(--muted); background: transparent; }
    .btn-ghost:hover  { border-color: var(--ink); color: var(--ink); }
    .btn-ink    { border-color: var(--ink-faint); color: var(--ink-mid); background: transparent; }
    .btn-ink:hover    { background: var(--ink-faint); }
    .btn-danger { border-color: rgba(178,34,34,0.25); color: var(--seal); background: transparent; }
    .btn-danger:hover { background: var(--seal-dim); }

    /* ─── Main ────────────────────────────────────────────────── */
    main {
      max-width: 1360px; margin: 0 auto; padding: 20px 20px 56px;
      transition: filter 0.42s;
    }
    main.drawer-dim { filter: brightness(0.92); }

    /* ─── Tab nav ─────────────────────────────────────────────── */
    .tab-nav {
      display: flex; gap: 2px;
      background: var(--card); border-radius: 6px;
      border: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      padding: 4px; margin-bottom: 24px;
    }

    .tab-btn {
      flex: 1; padding: 12px 8px; border: none; background: transparent;
      border-radius: 4px; cursor: pointer; font-size: 20px;
      letter-spacing: 5px; color: var(--muted);
      font-family: 'Noto Serif SC', 'STSong', 'SimSun', serif;
      font-weight: 400;
      transition: all 0.2s;
      position: relative;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    }

    .tab-btn.active  {
      background: var(--paper);
      color: var(--seal);
      font-weight: 800;
      letter-spacing: 6px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.08);
    }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: 5px; left: 20%; right: 20%;
      height: 1.5px;
      background: linear-gradient(to right,
        transparent 0%, var(--seal) 20%, var(--seal) 80%, transparent 100%);
      opacity: 0.85;
    }
    .tab-btn:not(.active):hover { background: rgba(0,0,0,0.03); color: var(--ink-mid); font-weight: 600; }

    .pane { display: none; }
    .pane.active { display: block; }

    /* ─── Section header ──────────────────────────────────────── */
    .sec-hdr {
      display: flex; align-items: center; gap: 14px; margin: 24px 0 14px;
    }

    .sec-title {
      font-family: 'Noto Serif SC', 'STSong', 'SimSun', serif;
      font-size: 13px; letter-spacing: 5px;
      color: var(--ink-mid); white-space: nowrap;
    }

    .sec-line { flex: 1; height: 1px; background: var(--border); }
    .sec-note { font-size: 10px; color: #c0b8b0; letter-spacing: 1px; white-space: nowrap; }

    /* ─── Stats row ───────────────────────────────────────────── */
    .stats-row {
      display: flex; gap: 0; background: var(--card);
      border-radius: 8px; border: 1px solid var(--border);
      box-shadow: var(--card-shadow);
      overflow: hidden; margin-bottom: 4px;
    }

    /* ─── Stats: 多宝阁 panels ─────────────────────────────────── */
    .sb-panel {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 18px 10px 14px; gap: 5px;
      border-right: 1px dashed rgba(44,62,80,0.10);
      position: relative;
    }
    .sb-panel:last-child { border-right: none; }

    .sb-glyph {
      position: absolute; top: 9px; right: 11px;
      font-family: 'Noto Serif SC', 'STSong', 'SimSun', serif;
      font-size: 14px; color: rgba(44,62,80,0.08);
      line-height: 1;
    }

    .sb-num {
      font-family: var(--sans);
      font-size: 44px; font-weight: 300; line-height: 1;
      letter-spacing: -2px; color: var(--ink);
      font-variant-numeric: tabular-nums;
      padding: 0 6px 6px;
      border-bottom: 1px solid rgba(44,62,80,0.14);
    }
    .sb-num.gold   { color: var(--gold); }
    .sb-num.bamboo { color: var(--bamboo); }
    .sb-num.muted  { color: #ccc; }

    .sb-lbl {
      font-size: 15px; color: var(--muted); letter-spacing: 2px;
      font-family: 'Noto Serif SC', 'STSong', 'SimSun', serif;
    }

    /* Completion arc panel */
    .arc-stat {
      flex: 1.2; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 10px;
      border-left: 1px dashed rgba(44,62,80,0.10);
    }

    .arc-wrap { position: relative; width: 72px; height: 72px; }
    .arc-svg  { width: 72px; height: 72px; transform: rotate(-90deg); }
    .arc-track { fill: none; stroke: var(--border); stroke-width: 3.5; }
    .arc-fill  { fill: none; stroke: var(--seal); stroke-width: 3.5;
                 stroke-linecap: round; transition: stroke-dasharray 0.6s; }

    .arc-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    .arc-pct {
      font-family: 'Georgia', serif;
      font-size: 17px; font-weight: 400; line-height: 1;
    }
    .arc-sub { font-size: 8px; color: var(--muted); letter-spacing: 1px; margin-top: 2px; }

    /* ─── Matrix scroll wrapper ───────────────────────────────── */
    .matrix-outer { overflow-x: auto; padding-bottom: 8px; }

    .matrix-inner { min-width: 760px; }

    /* ─── Adventure header (light) ────────────────────────────── */
    .adv-hdr {
      display: flex;
      border-bottom: 1px solid var(--border-mid);
      padding: 10px 0;
      background: var(--paper);
    }

    .adv-hdr-char { flex: 0 0 152px; padding: 0 14px 0 18px; }

    .adv-hdr-col {
      flex: 1; text-align: center; padding: 0 6px;
      border-left: 1px solid var(--border);
    }

    .adv-hdr-name {
      font-family: 'Noto Serif SC', 'STSong', 'SimSun', serif;
      font-size: 18px; font-weight: 800; color: var(--ink); letter-spacing: 4px;
    }

    .adv-hdr-req {
      margin-top: 7px;
      display: flex; flex-direction: column; align-items: stretch; gap: 2px;
      padding: 0 4px;
    }

    .req-tag {
      display: flex; align-items: center;
      padding: 3px 4px 3px 5px;
      border-left: 2px solid transparent;
      border-radius: 0 3px 3px 0;
      gap: 0;
    }

    .req-tag.consumed {
      background: rgba(178,34,34,0.04);
    }

    .req-dot {
      width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-right: 8px;
    }

    .req-label {
      font-family: var(--sans);
      font-size: 10px; color: #3a4a5a; font-weight: 600;
      letter-spacing: 0; white-space: nowrap;
    }

    .req-spacer { flex: 1; min-width: 10px; }

    .req-qty {
      font-family: var(--sans);
      font-size: 14px; font-weight: 700; color: var(--ink);
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
      letter-spacing: 0; white-space: nowrap;
      min-width: 2.8em; text-align: right;
    }

    .req-minus {
      font-size: 11px; font-weight: 400;
      color: var(--seal);
      font-family: var(--sans);
      display: inline-block; width: 1.2em; text-align: center; flex-shrink: 0;
    }

    .consume-hint {
      font-size: 10px; font-weight: 400; font-style: italic;
      opacity: 0.45; margin-left: 2px; flex-shrink: 0;
      font-family: var(--sans);
    }

    .dot-xs {
      display: inline-block; width: 5px; height: 5px;
      border-radius: 50%; vertical-align: middle;
    }

    /* ─── Account cards ───────────────────────────────────────── */
    .cards-area {
      display: flex; flex-direction: column; gap: 14px; padding: 14px 0;
    }

    .acc-group { display: flex; flex-direction: column; gap: 0; }

    .acc-group-lbl {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 18px 10px 2px;
      background: linear-gradient(to right, rgba(44,62,80,0.055) 0%, rgba(44,62,80,0.018) 40%, transparent 100%);
      border-radius: 4px 0 0 0;
      margin-bottom: 2px;
    }


    .acc-group-bar {
      width: 3px; height: 18px; border-radius: 2px;
      background: var(--ink); flex-shrink: 0;
    }

    .acc-group-name {
      font-family: 'Noto Serif SC', 'STSong', 'SimSun', serif;
      font-size: 15px; font-weight: 700; letter-spacing: 6px;
      color: var(--ink);
    }

    .acc-group-prog {
      font-size: 10px; color: var(--muted); letter-spacing: 1px;
      margin-left: auto;
    }

    .acc-card {
      background: var(--card); border-radius: 10px;
      border: 1px solid var(--border-mid);
      border-left: 2px solid rgba(26,37,53,0.22);
      box-shadow: var(--card-shadow), 0 3px 10px rgba(0,0,0,0.07);
      overflow: hidden;
    }

    .acc-card-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 18px 10px 16px;
      border-bottom: 1.5px solid var(--border-mid);
      background: linear-gradient(to right, rgba(26,37,53,0.10) 0%, #f4efe7 50%, #f9f5f0 100%);
      border-left: 3px solid var(--ink);
    }

    .acc-card-name {
      font-family: 'Noto Serif SC', 'STSong', 'SimSun', serif;
      font-size: 16px; font-weight: 800; letter-spacing: 6px; color: var(--ink);
    }

    .acc-card-prog { font-size: 10px; color: var(--muted); letter-spacing: 1px; }

    /* ─── Character row ───────────────────────────────────────── */
    .char-row {
      display: flex; align-items: stretch;
      border-bottom: 1px solid #f2ede5;
      transition: background 0.15s;
    }
    .char-row:last-child { border-bottom: none; }
    .char-row:hover { background: #fdf9f4; }

    .char-col {
      flex: 0 0 152px; padding: 10px 12px 10px 18px;
      display: flex; align-items: center; gap: 10px;
      border-right: 1px solid var(--border);
    }

    .char-icon-wrap {
      width: 44px; height: 44px;
      border-radius: 4px; flex-shrink: 0;
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(44,62,80,0.10), 0 0 0 1px rgba(44,62,80,0.06);
    }

    .char-icon {
      width: 36px; height: 36px; border-radius: 3px;
      object-fit: contain; opacity: 0.6;
    }

    .char-name { font-size: 13px; font-weight: 700; color: var(--ink); white-space: nowrap; }

    .badge-main {
      font-size: 8px; background: var(--gold); color: #fff;
      padding: 1px 5px 1px 4px;
      border-radius: 2px 8px 8px 2px;
      letter-spacing: 1px; margin-left: 4px; vertical-align: middle;
    }

    /* ─── Adventure cell (click zone) ────────────────────────── */
    .adv-col {
      flex: 1; border-left: 1px solid #f2ede5;
      cursor: pointer; position: relative;
      transition: background 0.15s;
    }
    .adv-col:hover { background: rgba(0,0,0,0.015); }

    /* ─── Cell: 未开启 ───────────────────────────────────────── */
    .cell-void {
      display: flex; flex-direction: column;
      gap: 5px; padding: 10px 10px 10px 10px; min-height: 80px;
      opacity: 0.48;
    }

    .cell-void.iron-ready {
      opacity: 1;
      border-left: 2px dashed var(--gold);
      background: rgba(201,168,76,0.04);
    }

    .cell-void .iron-own { color: var(--muted); font-weight: 500; }
    .cell-void.iron-ready .iron-own.ok { color: var(--bamboo); }

    /* ─── Cell: 进行中 ───────────────────────────────────────── */
    .cell-active {
      display: flex; flex-direction: column;
      gap: 5px; padding: 10px 10px 10px 10px; min-height: 80px;
      border-left: 2.5px solid var(--gold);
      background: rgba(201,168,76,0.035);
    }

    .active-label {
      font-family: 'Noto Serif SC', 'STSong', 'SimSun', serif;
      font-size: 11px; color: var(--gold); letter-spacing: 1px;
      text-align: center;
    }

    /* Mini progress bars for iron in active cells */
    .iron-bar-mini {
      display: flex; align-items: center; gap: 4px; width: 100%;
    }

    .iron-dot-mini {
      width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
    }

    .iron-track {
      flex: 1; height: 2px; background: rgba(0,0,0,0.07);
      border-radius: 1px; overflow: hidden;
    }

    .iron-fill { height: 100%; border-radius: 1px; transition: width 0.3s; }

    .iron-nums {
      white-space: nowrap; min-width: 42px;
      text-align: right; flex-shrink: 0;
      display: flex; align-items: baseline; justify-content: flex-end; gap: 0;
    }

    .iron-own {
      font-size: 13px; font-weight: 600; line-height: 1;
      color: var(--ink-mid);
      font-family: var(--sans);
      font-variant-numeric: tabular-nums;
    }
    .iron-own.ok    { color: var(--bamboo); }
    .iron-own.short { color: var(--seal); }

    .iron-sep {
      font-size: 9px; color: #d0ccc8; padding: 0 1px;
      font-family: var(--sans);
    }

    .iron-ttl {
      font-size: 9px; color: #c0b8b0; font-weight: 400;
      font-family: var(--sans);
    }

    .cell-void-empty {
      min-height: 80px;
    }

    .ready-pill {
      display: inline-block; font-size: 9px; letter-spacing: 1px;
      color: var(--bamboo); border: 1px solid var(--bamboo);
      border-radius: 3px; padding: 1px 5px; text-align: center;
      font-family: 'Noto Serif SC', 'STSong', 'SimSun', serif;
    }

    /* ─── Cell: 已完成 ───────────────────────────────────────── */
    .cell-done {
      display: flex; align-items: center; justify-content: center;
      min-height: 80px;
      background: rgba(178,34,34,0.025);
    }

    .seal-ring {
      width: 48px; height: 48px; border-radius: 50%;
      border: 2px solid rgba(178,34,34,0.40);
      display: flex; align-items: center; justify-content: center;
      transform: rotate(-12deg);
      box-shadow: 0 0 0 1px rgba(178,34,34,0.1);
    }

    .seal-ring.stamping {
      animation: stamp-in 0.45s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
    }

    @keyframes stamp-in {
      0%   { transform: scale(1.8) rotate(-12deg); opacity: 0; }
      50%  { transform: scale(0.88) rotate(-14deg); opacity: 0.5; }
      80%  { transform: scale(1.06) rotate(-11deg); opacity: 0.42; }
      100% { transform: scale(1) rotate(-12deg); opacity: 1; }
    }

    .seal-char {
      font-family: 'Noto Serif SC', 'STSong', 'SimSun', serif;
      font-size: 22px; color: rgba(178,34,34,0.42);
      line-height: 1; transform: rotate(0deg);
    }


    /* ─── Inventory tab ───────────────────────────────────────── */
    .inv-outer { overflow-x: auto; padding-bottom: 8px; }
    .inv-inner { min-width: 740px; }

    .inv-hdr {
      display: flex;
      border-bottom: 1.5px solid var(--border-mid);
      padding: 0;
      background: var(--paper);
    }

    .inv-hdr-char { flex: 0 0 148px; padding: 0 12px 0 16px; }

    .inv-hdr-iron {
      flex: 1; text-align: center;
      padding: 14px 4px 13px;
      border-left: 1px solid var(--border);
    }

    .inv-hdr-iron-name {
      display: block;
      font-size: 16px; font-weight: 700;
      font-family: 'Noto Serif SC', 'STSong', serif;
      margin-top: 7px; margin-bottom: 5px;
      letter-spacing: 1px;
    }
    .inv-hdr-iron-lvl {
      display: block;
      font-size: 10px;
      color: rgba(26,37,53,0.32);
      font-family: 'Noto Serif SC', 'STSong', serif;
      letter-spacing: 0.5px;
    }

    .inv-cards-area {
      display: flex; flex-direction: column; gap: 14px; padding: 14px 0;
    }

    .inv-card {
      background: var(--card); border-radius: 10px;
      border: 1px solid var(--border-mid);
      border-left: 2px solid rgba(26,37,53,0.22);
      box-shadow: var(--card-shadow), 0 3px 10px rgba(0,0,0,0.07);
      overflow: hidden;
    }

    .inv-card-hdr {
      padding: 8px 20px 8px 16px;
      border-bottom: 1px solid rgba(44,62,80,0.06);
      background: transparent;
      font-size: 11px; font-weight: 600;
      letter-spacing: 4px; color: var(--ink-mid);
    }

    /* ─── Collapsible account header ─────────────────────────── */
    .acc-hdr-toggle {
      display: flex; align-items: center; gap: 9px;
      cursor: pointer; user-select: none;
      transition: background 0.25s;
    }
    .acc-hdr-toggle:hover {
      background: rgba(44,62,80,0.045);
    }
    .acc-hdr-toggle.is-collapsed-hdr {
      background: rgba(201,168,76,0.06);
      border-bottom-color: rgba(201,168,76,0.18);
    }

    .acc-toggle-icon {
      display: inline-block; flex-shrink: 0;
      width: 6px; height: 6px;
      border-right: 1.5px solid var(--ink);
      border-bottom: 1.5px solid var(--ink);
      transform: rotate(45deg) translateY(-1px);
      transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
    }
    .acc-toggle-icon.is-collapsed { transform: rotate(-45deg) translateX(1px); }

    .acc-hdr-prog {
      margin-left: auto;
      font-size: 10px; font-weight: 400; letter-spacing: 1px;
      color: var(--muted); white-space: nowrap;
      font-family: var(--sans);
      padding-right: 4px;
    }
    .acc-hdr-prog .prog-done { color: var(--bamboo); font-weight: 600; }
    .acc-hdr-prog .prog-active { color: var(--gold); font-weight: 500; }
    .is-collapsed-hdr .acc-hdr-prog { opacity: 0.5; transition: opacity 0.25s; }
    .acc-hdr-toggle:not(.is-collapsed-hdr) .acc-hdr-prog { opacity: 1; transition: opacity 0.25s; }

    .acc-body {
      overflow: hidden;
      max-height: 3000px;
      opacity: 1;
      transition: max-height 0.42s cubic-bezier(0.4,0,0.2,1),
                  opacity   0.28s ease;
    }
    .acc-body.is-collapsed {
      max-height: 0;
      opacity: 0;
    }

    .inv-char-row {
      display: flex; align-items: stretch;
      border-bottom: 1px solid #f2ede5;
      transition: background 0.15s;
    }
    .inv-char-row:last-child { border-bottom: none; }
    .inv-char-row:hover { background: #fdf9f4; }

    .inv-char-col {
      flex: 0 0 148px; padding: 8px 12px 8px 16px;
      display: flex; align-items: center; gap: 9px;
      border-right: 1px solid var(--border);
    }

    .inv-iron-col {
      flex: 1;
      padding: 4px 2px;
    }

    .inv-cell-inner {
      position: relative;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 68px; padding: 8px 4px;
      background: transparent;
    }

    .inv-qty {
      font-size: 26px; font-weight: 500; cursor: pointer;
      padding: 0 2px; border-radius: 2px;
      transition: color 0.15s, background 0.15s; line-height: 1.1;
      min-width: 38px; text-align: center;
      color: var(--ink);
      font-variant-numeric: tabular-nums; font-family: var(--sans);
    }
    .inv-qty:hover { background: rgba(0,0,0,0.04); }
    .inv-cell-inner.insufficient .inv-qty { color: var(--seal); }

    .inv-qty-input {
      /* 与静态数字完全一致 */
      font-size: 26px; font-weight: 400;
      font-family: var(--sans); font-variant-numeric: tabular-nums;
      color: var(--ink); text-align: center; line-height: 1.1;
      width: 100%; min-width: 38px; padding: 0 2px;

      /* 去掉所有浏览器原生框 */
      border: none; outline: none;
      border-radius: 0; background: transparent;
      appearance: textfield; -moz-appearance: textfield;

      /* 两端渐隐的黛蓝底线，暗示可编辑 */
      background-image: linear-gradient(
        to right,
        transparent 0%,
        rgba(44,62,80,0.28) 20%,
        rgba(44,62,80,0.28) 80%,
        transparent 100%
      );
      background-repeat: no-repeat;
      background-size: 100% 1px;
      background-position: bottom center;
    }

    /* 去掉 Webkit 的 Spin 箭头 */
    .inv-qty-input::-webkit-outer-spin-button,
    .inv-qty-input::-webkit-inner-spin-button {
      -webkit-appearance: none; margin: 0;
    }

    /* 选中文字用淡金色而非蓝色 */
    .inv-qty-input::selection {
      background: rgba(201,168,76,0.22);
      color: var(--ink);
    }

    /* gap：绝对定位于右上角，作为小注 */
    .inv-gap {
      position: absolute; top: 4px; right: 5px;
      font-size: 8px; font-weight: 500; line-height: 1;
      font-family: var(--sans); font-variant-numeric: tabular-nums;
      pointer-events: none;
    }
    .inv-gap.short { color: #8B4252; opacity: 0.85; }
    .inv-gap.ok    { color: var(--bamboo); opacity: 0.7; }
    .inv-gap.none  { opacity: 0; }

    /* +1：平时隐藏，悬浮时浮现 */
    .inv-btns {
      position: absolute; bottom: 3px; right: 4px;
      opacity: 0; transition: opacity 0.18s;
    }
    .inv-cell-inner:hover .inv-btns { opacity: 1; }

    .inv-btn {
      border: none; background: transparent;
      font-size: 14px; font-weight: 300; line-height: 1;
      color: rgba(44,62,80,0.35); cursor: pointer; padding: 0 2px;
      transition: color 0.15s; font-family: var(--sans);
    }
    .inv-btn:hover { color: var(--gold); }


    /* ─── Data management ─────────────────────────────────────── */
    .data-card {
      background: transparent;
      padding: 0;
    }

    .data-note {
      font-family: 'Noto Serif SC', 'STSong', serif;
      font-size: 10px; color: rgba(26,37,53,0.35); letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .data-textarea {
      display: block; width: 100%; height: 88px;
      font-size: 11px; font-family: 'Noto Serif SC', 'STSong', serif;
      color: var(--ink); letter-spacing: 0.5px; line-height: 1.8;
      border: none;
      border-bottom: 1px solid var(--border-mid);
      background: transparent;
      padding: 10px 2px;
      outline: none; resize: none;
    }
    .data-textarea:focus { border-bottom-color: var(--ink); }

    .data-actions {
      display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; align-items: center;
    }

    .btn-seal {
      border: 1px solid rgba(184,136,30,0.50);
      color: var(--gold);
      background: transparent;
      padding: 5px 20px;
      font-family: 'Noto Serif SC', 'STSong', serif;
      font-size: 13px; font-weight: 600; letter-spacing: 3px;
      cursor: pointer; border-radius: 3px;
      transition: background 0.22s, border-color 0.22s;
    }
    .btn-seal:hover {
      background: rgba(184,136,30,0.08);
      border-color: var(--gold);
    }
    .btn-seal:active { animation: ink-bloom 0.38s ease-out; }

    @keyframes ink-bloom {
      0%   { background: transparent; }
      25%  { background: rgba(184,136,30,0.20); }
      100% { background: transparent; }
    }

    .btn-seal-danger {
      border-color: rgba(122,32,32,0.45);
      color: var(--seal);
      margin-left: auto;
    }
    .btn-seal-danger:hover { background: var(--seal-dim); border-color: var(--seal); }
    .btn-seal-danger:active { animation: ink-bloom-danger 0.38s ease-out; }

    /* ─── 云端同步区 ─────────────────────────────────────────── */
    .drawer-divider { height: 1px; background: var(--border); margin: 22px 0 18px; }
    .sheets-url-row { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
    .sheets-url-input {
      flex: 1; font-size: 10px; font-family: 'Noto Serif SC', 'STSong', serif;
      color: var(--ink); padding: 5px 4px;
      border: none; border-bottom: 1px solid var(--border-mid);
      background: transparent; outline: none;
      transition: border-bottom-color 0.18s;
    }
    .sheets-url-input:focus { border-bottom-color: var(--ink); }
    .sheets-url-input::placeholder { color: rgba(26,37,53,0.28); }
    .sync-status {
      font-size: 10px; letter-spacing: 1px; margin-top: 8px;
      font-family: 'Noto Serif SC', 'STSong', serif; min-height: 14px;
      transition: color 0.2s;
    }
    .sync-status-hdr {
      display: inline-flex; align-items: center; gap: 5px;
      margin-right: 14px; font-size: 10px; letter-spacing: 1px;
      font-family: 'Noto Serif SC', 'STSong', serif;
      color: #2E5A68; opacity: 0;
      transition: opacity 0.4s; white-space: nowrap; cursor: default;
    }
    .sync-status-hdr.visible { opacity: 1; }
    .sync-status-hdr.err { color: var(--seal); }
    .sync-icon { flex-shrink: 0; transform: translateY(1px); }
    .sync-detail {
      font-size: 9px; color: var(--muted); letter-spacing: 0.6px;
      white-space: nowrap; opacity: 0;
      transition: opacity 0.25s ease-out;
    }
    .sync-detail.show { opacity: 1; }

    @keyframes ink-bloom-danger {
      0%   { background: transparent; }
      25%  { background: rgba(122,32,32,0.14); }
      100% { background: transparent; }
    }

    /* ─── 自定义模态框 ─────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 600;
      background: rgba(26,37,53,0.22);
      backdrop-filter: blur(1.5px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.28s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .custom-modal {
      background: #fdfaf5;
      border: 1px solid #d4c9b8;
      border-radius: 4px;
      font-family: 'Noto Serif SC', 'STSong', serif;
      padding: 36px 40px 28px;
      width: 320px;
      box-shadow: 0 2px 8px rgba(26,37,53,0.08),
                  0 12px 40px rgba(26,37,53,0.14),
                  0 32px 80px rgba(26,37,53,0.10);
      text-align: center;
      transform: translateY(-10px);
      transition: transform 0.32s cubic-bezier(0.22,0.9,0.36,1);
    }
    .modal-overlay.open .custom-modal { transform: translateY(0); }
    .modal-title {
      font-size: 17px; font-weight: 700; color: var(--ink);
      letter-spacing: 6px; margin: 0 0 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(26,37,53,0.10);
    }
    .modal-body {
      font-size: 13px; color: var(--ink-mid); line-height: 1.85;
      letter-spacing: 0.5px; margin: 0 0 28px;
    }
    .modal-footer { display: flex; justify-content: center; gap: 14px; }
    .modal-btn {
      font-family: 'Noto Serif SC', 'STSong', serif;
      font-size: 13px; letter-spacing: 2px;
      padding: 6px 22px 8px; border-radius: 3px;
      background: transparent; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      transition: background 0.18s, color 0.18s;
    }
    .modal-btn-cancel {
      border: 1px solid var(--border-mid); color: var(--muted);
    }
    .modal-btn-cancel:hover { background: var(--gold-dim); color: var(--ink); }
    .modal-btn-confirm {
      border: 1px solid #a61b29; color: #a61b29;
    }
    .modal-btn-confirm:hover { background: rgba(166,27,41,0.08); }

    /* ─── 考据归档 抽屉 ──────────────────────────────────────── */
    .drawer-overlay {
      position: fixed; inset: 0; z-index: 400;
      background: rgba(26,37,53,0.18);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.35s;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: auto; }

    .data-drawer {
      position: fixed; top: 0; right: -420px; width: 380px; height: 100%;
      background: #fdfaf5;
      background-image: radial-gradient(circle, rgba(90,70,40,0.025) 1px, transparent 1px);
      background-size: 20px 20px;
      border-left: 1px solid var(--border-mid);
      box-shadow: -4px 0 28px rgba(0,0,0,0.10);
      z-index: 500;
      display: flex; flex-direction: column;
      transition: right 0.42s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .data-drawer.open { right: 0; }

    .drawer-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 26px 18px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .drawer-title {
      font-family: 'Noto Serif SC', 'STSong', serif;
      font-size: 17px; font-weight: 700; letter-spacing: 9px; color: var(--ink);
    }
    .drawer-close {
      width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid rgba(26,37,53,0.18);
      background: transparent; cursor: pointer;
      position: relative; flex-shrink: 0;
      transition: border-color 0.22s, transform 0.28s ease;
    }
    .drawer-close::before,
    .drawer-close::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 11px; height: 1px;
      background: var(--muted);
      transition: background 0.22s;
    }
    .drawer-close::before { transform: translate(-50%, -50%) rotate(45deg); }
    .drawer-close::after  { transform: translate(-50%, -50%) rotate(-45deg); }
    .drawer-close:hover {
      border-color: var(--seal);
      transform: rotate(90deg);
    }
    .drawer-close:hover::before,
    .drawer-close:hover::after { background: var(--seal); }

    .drawer-body {
      flex: 1; padding: 26px 26px 32px;
      overflow-y: auto; display: flex; flex-direction: column; gap: 0;
    }

    .btn-archive {
      display: inline-flex; align-items: center; gap: 8px;
      border: 1px solid var(--border-mid);
      color: var(--ink-mid); background: transparent;
      padding: 5px 14px; border-radius: 4px; font-size: 11px;
      letter-spacing: 2px; cursor: pointer; font-family: inherit;
      transition: all 0.2s;
    }
    .btn-archive:hover { border-color: var(--gold); color: var(--gold); }
    .btn-archive svg { flex-shrink: 0; transition: color 0.2s; transform: translateY(1px); }

    /* ─── Responsive ──────────────────────────────────────────── */
    @media (max-width: 700px) {
      .mats-grid { grid-template-columns: 1fr; }
      main { padding: 12px 10px 40px; }
    }

    /* ─── Weapon tabs (神兵志 / 名品录) ──────────────────────── */
    .weapon-subnav {
      display: flex; align-items: center; flex-wrap: wrap; gap: 0;
      padding-bottom: 14px; margin-bottom: 22px;
      border-bottom: 1px solid var(--border);
    }

    .wsubtab {
      padding: 6px 18px; border: none; background: transparent;
      font-family: 'Noto Serif SC', 'STSong', 'SimSun', serif;
      font-size: 16px; letter-spacing: 4px; color: var(--muted);
      cursor: pointer; position: relative; transition: color 0.2s, background 0.2s;
      border-radius: 3px;
    }
    .wsubtab::after {
      content: ''; position: absolute;
      bottom: -1px; left: 18%; right: 18%; height: 1px;
      background: linear-gradient(to right, transparent, var(--seal), transparent);
      opacity: 0; transition: opacity 0.22s;
    }
    .wsubtab.active {
      color: var(--seal);
      background: rgba(139,58,58,0.05);
      box-shadow: inset 0 0 0 1px rgba(139,58,58,0.12);
    }
    .wsubtab.active::after { opacity: 0.5; }
    .wsubtab:not(.active):hover { color: var(--ink-mid); }
    .wsubtab-sep { color: rgba(44,62,80,0.15); font-size: 11px; align-self: center; padding: 0 2px; }

    /* ─── 分级拓印券（印章块布局）────────────────────────────── */
    .char-coupon-tiers {
      display: inline-flex; align-items: stretch; gap: 0;
      flex-shrink: 0; white-space: nowrap;
      border: 1px solid rgba(26,37,53,0.10);
      border-radius: 5px; overflow: hidden;
    }
    .coupon-tier-sep {
      width: 1px; background: rgba(26,37,53,0.08);
      align-self: stretch; flex-shrink: 0;
    }
    .coupon-tier-cell {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 0; cursor: pointer; padding: 5px 10px 6px;
      transition: background 0.15s; min-width: 42px;
    }
    .coupon-tier-cell:hover { background: rgba(0,0,0,0.04); }
    .coupon-tier-lbl {
      font-size: 9px; font-weight: 700; line-height: 1.2;
      font-family: var(--sans); letter-spacing: 0.5px; margin-bottom: 2px;
    }
    .coupon-tier-lbl.cw  { color: #7A5820; }
    .coupon-tier-lbl.sow { color: #6030A0; }
    .coupon-tier-num {
      font-size: 22px; font-weight: 400; line-height: 1;
      font-variant-numeric: tabular-nums; font-family: var(--sans);
    }
    .coupon-tier-num.cw  { color: var(--gold); }
    .coupon-tier-num.sow { color: #7B50C0; }
    .coupon-tier-num.empty { color: rgba(26,37,53,0.20); font-size: 18px; font-weight: 300; }
    .coupon-tier-input {
      font-size: 22px; font-weight: 400; line-height: 1;
      font-variant-numeric: tabular-nums; font-family: var(--sans);
      width: 2em; text-align: center;
      border: none; border-bottom: 1.5px solid;
      background: transparent; outline: none;
      appearance: textfield; -moz-appearance: textfield;
    }
    .coupon-tier-input.cw  { color: var(--gold); border-bottom-color: rgba(184,136,30,0.55); }
    .coupon-tier-input.sow { color: #7B50C0;      border-bottom-color: rgba(123,80,192,0.50); }
    .coupon-tier-input::-webkit-inner-spin-button,
    .coupon-tier-input::-webkit-outer-spin-button { -webkit-appearance: none; }

    .weapon-acc-group { margin-bottom: 22px; }

    .weapon-acc-lbl {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 14px 9px 0;
      border-bottom: 1.5px solid rgba(26,37,53,0.18); margin-bottom: 4px;
      background: linear-gradient(to right, rgba(26,37,53,0.07) 0%, rgba(26,37,53,0.03) 55%, transparent 100%);
      border-radius: 2px 0 0 0;
    }
    .weapon-acc-bar { width: 3px; height: 18px; border-radius: 2px; background: var(--ink); flex-shrink: 0; }
    .weapon-acc-name { font-family: 'Noto Serif SC', 'STSong', 'SimSun', serif; font-size: 17px; font-weight: 700; letter-spacing: 5px; color: var(--ink); }
    .weapon-acc-lbl { cursor: pointer; user-select: none; }
    .weapon-acc-lbl:hover { background: linear-gradient(to right, rgba(26,37,53,0.10) 0%, rgba(26,37,53,0.04) 55%, transparent 100%); }
    .weapon-acc-chevron {
      margin-left: auto; display: flex; align-items: center;
      color: rgba(26,37,53,0.30); transition: transform 0.2s, color 0.15s;
    }
    .weapon-acc-lbl:hover .weapon-acc-chevron { color: rgba(26,37,53,0.55); }
    .weapon-acc-group.collapsed .weapon-acc-chevron { transform: rotate(-90deg); }
    .weapon-acc-group.collapsed .weapon-acc-rows { display: none; }

    .weapon-char-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 0 9px 10px;
      border-bottom: 1px solid rgba(26,37,53,0.09);
    }
    .weapon-char-row:last-child { border-bottom: none; }

    .weapon-char-icon {
      width: 26px; height: 26px; border-radius: 3px;
      object-fit: contain; opacity: 0.76; flex-shrink: 0;
      box-shadow: 0 0 0 1px rgba(44,62,80,0.10);
    }

    .weapon-char-lbl {
      flex: 0 0 auto; min-width: 3em; font-size: 16px; font-weight: 800; color: var(--ink);
      font-family: 'Noto Serif SC', 'STSong', 'SimSun', serif; letter-spacing: 1px; white-space: nowrap; flex-shrink: 0;
    }

    .weapon-entries { flex: 1; display: flex; flex-wrap: wrap; align-items: center; gap: 5px 14px; }
    .weapon-entries > .weapon-entry:first-child { margin-left: 24px; }

    .weapon-entry {
      display: inline-flex; align-items: baseline; gap: 2px;
      font-family: 'Noto Serif SC', 'STSong', 'SimSun', serif; font-size: 15px; letter-spacing: 0.1em;
      cursor: default;
    }
    .weapon-entry.owned     { color: var(--ink); }
    .weapon-entry.preparing { color: var(--ink-mid); }
    .weapon-entry.waiting   { color: var(--gold); }

    .weapon-name {
      cursor: pointer; border-radius: 2px; padding: 0 1px;
      transition: background 0.15s;
    }
    .weapon-name:hover { background: rgba(44,62,80,0.07); }

    .weapon-edit-input {
      font-family: 'Noto Serif SC', 'STSong', 'SimSun', serif;
      font-size: inherit; color: inherit; letter-spacing: 0.08em;
      background: transparent; border: none;
      border-bottom: 1px solid rgba(44,62,80,0.28);
      outline: none; padding: 0 2px;
      min-width: 4em; width: 8em;
    }

    .weapon-stage {
      font-size: 9px; color: var(--muted); margin-right: 2px;
      font-family: var(--sans); flex-shrink: 0;
    }

    .weapon-rm {
      border: none; background: transparent; cursor: pointer;
      color: rgba(44,62,80,0.18); font-size: 10px;
      padding: 0 1px; margin-left: 2px; line-height: 1; transition: color 0.15s;
    }
    .weapon-rm:hover { color: var(--seal); }

    .weapon-none { font-size: 13px; color: rgba(44,62,80,0.22); letter-spacing: 3px; font-family: 'Noto Serif SC', 'STSong', 'SimSun', serif; }

    .weapon-add-trigger {
      border: none; background: transparent; cursor: pointer;
      color: rgba(44,62,80,0.22); font-size: 15px; font-weight: 300;
      padding: 0 3px; line-height: 1; transition: color 0.15s; flex-shrink: 0;
    }
    .weapon-add-trigger:hover { color: var(--gold); }

    .weapon-inline-form { display: inline-flex; align-items: baseline; gap: 4px; }

    .weapon-name-input {
      font-size: 12px; font-family: 'Noto Serif SC', 'STSong', 'SimSun', serif;
      color: var(--ink); letter-spacing: 1px; width: 80px; padding: 0 1px;
      border: none; border-bottom: 1px solid rgba(44,62,80,0.38);
      background: transparent; outline: none;
    }

    .weapon-stage-input {
      font-size: 11px; color: var(--muted); width: 28px; text-align: center;
      border: none; border-bottom: 1px solid var(--border-mid);
      background: transparent; outline: none; font-family: var(--sans);
      appearance: textfield; -moz-appearance: textfield;
    }
    .weapon-stage-input::-webkit-inner-spin-button,
    .weapon-stage-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  </style>
</head>
<body>

<header>
  <div class="hdr-left">
    <div class="hdr-accent-bar"></div>
    <div>
      <div class="hdr-title">橙武奇遇追踪器</div>
      <div class="hdr-sub">CW ADVENTURE TRACKER · 剑网三</div>
    </div>
  </div>
  <div class="hdr-right">
    <span id="syncStatus" class="sync-status-hdr">
      <svg class="sync-icon" width="17" height="10" viewBox="0 0 17 10" fill="none"><path d="M1 8 C4 2.5 7 5 8.5 4 C10 5 13 2.5 16 8" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
      <span id="syncBrief"></span><span id="syncDetail" class="sync-detail"></span>
    </span>
    <button class="btn-archive" onclick="openDrawer()"><svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1.5" y="3" width="10" height="7" rx="0.5" stroke="currentColor" stroke-width="1"/><line x1="1.5" y1="3" x2="11.5" y2="3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="1.5" y1="10" x2="11.5" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="4" y1="6" x2="9" y2="6" stroke="currentColor" stroke-width="0.8"/><line x1="4" y1="7.8" x2="9" y2="7.8" stroke="currentColor" stroke-width="0.8"/></svg>考据归档</button>
    <button class="btn btn-ghost" onclick="resetAll()">重置进度</button>
  </div>
</header>

<main>

  <div class="tab-nav">
    <button class="tab-btn active" id="tabBtn-progress"  onclick="switchTab('progress')">进度矩阵</button>
    <button class="tab-btn"        id="tabBtn-inventory" onclick="switchTab('inventory')">库存管理</button>
    <button class="tab-btn"        id="tabBtn-cw"        onclick="switchTab('cw')"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="display:block"><polygon points="7,1 6.2,10.5 7,12 7.8,10.5" fill="currentColor" opacity="0.85"/><line x1="3.5" y1="11" x2="10.5" y2="11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="7" y1="11" x2="7" y2="13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>神兵志</button>
